{% extends 'parent.html' %}

{% block content %}
<h1>Add Trainee</h1>

{% if error %}
<p style="color: red;">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <label for="name">Name:</label>
    <input type="text" id="name" name="name">
    <button type="submit">Save</button>
</form>
{% endblock %}
